defaults:
  - submitit_slurm

partition: normal
nodes: 1
tasks_per_node: 1
gpus_per_node: 1
cpus_per_task: 8
timeout_min: 240
mem_gb: 32

setup:
  - 'echo ">>> [DEBUG] Starting Job $SLURM_JOB_ID on Node: $(hostname)"'
  - 'echo ">>> [DEBUG] User: $(whoami), Shell PWD: $(pwd)"'
  - 'echo ">>> [DEBUG] TMPDIR is located at: $TMPDIR"'
  - 'PROJECT_ROOT="${oc.env:PROJECT_ROOT,}"'
  - 'if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="$(pwd)"; fi'
  - 'echo ">>> [DEBUG] PROJECT_ROOT resolved to: $PROJECT_ROOT"'
  - 'DATASET_ID="${run_cfg.dataset_id}"'
  - 'SOURCE_DATASET_ROOT="$PROJECT_ROOT/datasets"'
  - 'DATASET_ROOT="/home/tm/$USER/meta-learning/datasets"'
  - 'echo ">>> [DEBUG] DATASET_ID: $DATASET_ID"'
  - 'echo ">>> [DEBUG] SOURCE_DATASET_ROOT: $SOURCE_DATASET_ROOT"'
  - 'echo ">>> [DEBUG] DATASET_ROOT (expected): $DATASET_ROOT"'
  - 'echo ">>> [DEBUG] Source dataset listing:"; ls -lah "$SOURCE_DATASET_ROOT" 2>/dev/null || echo ">>> [DEBUG] Source dataset root not listable"'
  - 'echo ">>> [DEBUG] Expected dataset listing:"; ls -lah "$DATASET_ROOT" 2>/dev/null || echo ">>> [DEBUG] Expected dataset root not listable yet"'
  - 'if [ ! -d "$DATASET_ROOT/$DATASET_ID" ]; then echo ">>> [DEBUG] Dataset missing in expected location: $DATASET_ROOT/$DATASET_ID"; if [ ! -d "$SOURCE_DATASET_ROOT/$DATASET_ID" ]; then echo "!!! [ERROR] Source dataset directory not found: $SOURCE_DATASET_ROOT/$DATASET_ID"; exit 1; fi; mkdir -p "$DATASET_ROOT"; echo ">>> [DEBUG] Copying dataset to expected location..."; cp -R "$SOURCE_DATASET_ROOT/$DATASET_ID" "$DATASET_ROOT/"; fi'
  - 'SRC_DIR="$DATASET_ROOT/$DATASET_ID"'
  - 'ARCHIVE="$DATASET_ROOT/$DATASET_ID.tgz"'
  - 'TMP_DATASETS_DIR="$TMPDIR/datasets"'
  - 'TMP_ARCHIVE="$TMP_DATASETS_DIR/$DATASET_ID.tgz"'
  - 'TMP_DATASET_DIR="$TMP_DATASETS_DIR/$DATASET_ID"'
  - 'echo ">>> [DEBUG] SRC_DIR: $SRC_DIR"'
  - 'echo ">>> [DEBUG] ARCHIVE: $ARCHIVE"'
  - 'echo ">>> [DEBUG] TMP_DATASETS_DIR: $TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] TMP_ARCHIVE: $TMP_ARCHIVE"'
  - 'echo ">>> [DEBUG] TMP_DATASET_DIR: $TMP_DATASET_DIR"'
  - 'if [ ! -d "$SRC_DIR" ]; then echo "!!! [ERROR] Dataset directory not found: $SRC_DIR"; exit 1; fi'
  - 'echo ">>> [DEBUG] Source dataset disk usage:"; du -sh "$SRC_DIR" 2>/dev/null || true'
  - 'if [ ! -f "$ARCHIVE" ]; then echo ">>> [DEBUG] Creating archive: $ARCHIVE"; tar -C "$DATASET_ROOT" -czf "$ARCHIVE" "$DATASET_ID" || { echo "!!! [ERROR] tar create failed for $ARCHIVE"; exit 1; }; else echo ">>> [DEBUG] Reusing existing archive: $ARCHIVE"; fi'
  - 'echo ">>> [DEBUG] Archive info:"; ls -lh "$ARCHIVE" || { echo "!!! [ERROR] Archive missing after create/reuse: $ARCHIVE"; exit 1; }'
  - 'mkdir -p "$TMP_DATASETS_DIR"'
  - 'cp "$ARCHIVE" "$TMP_ARCHIVE" || { echo "!!! [ERROR] Failed to copy archive to TMP: $TMP_ARCHIVE"; exit 1; }'
  - 'echo ">>> [DEBUG] Extracting $TMP_ARCHIVE into $TMP_DATASETS_DIR"'
  - 'tar -C "$TMP_DATASETS_DIR" -xzf "$TMP_ARCHIVE" || { echo "!!! [ERROR] tar extract failed for $TMP_ARCHIVE"; exit 1; }'
  - 'if [ ! -d "$TMP_DATASET_DIR" ]; then echo "!!! [ERROR] Extracted dataset directory missing: $TMP_DATASET_DIR"; exit 1; fi'
  - 'echo ">>> [DEBUG] Extracted dataset listing (first 40 entries):"; ls -lah "$TMP_DATASET_DIR" | head -n 40'
  - 'export DATASETS_DIR="$TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] DATASETS_DIR set to: $DATASETS_DIR"'
