defaults:
  - submitit_slurm

partition: normal
nodes: 1
tasks_per_node: 1
gpus_per_node: 1
cpus_per_task: 8
timeout_min: 320 # 240
mem_gb: 32

setup:
  - 'echo ">>> [DEBUG] Starting Job $SLURM_JOB_ID on Node: $(hostname)"'
  - 'echo ">>> [DEBUG] TMPDIR is located at: $TMPDIR"'
  - 'if [ -n "$LD_LIBRARY_PATH" ]; then CLEAN_LD="$(echo "$LD_LIBRARY_PATH" | tr ":" "\n" | grep -vi cudnn | paste -sd: -)"; export LD_LIBRARY_PATH="$CLEAN_LD"; fi'
  - 'unset CUDNN_PATH CUDNN_HOME'
  - 'echo ">>> [DEBUG] Sanitized LD_LIBRARY_PATH to avoid external cuDNN conflicts"'
  - 'DATASET_ID="${run_cfg.dataset_id}"'
  - 'DATASET_DIR="${run_cfg.dataset_dir}"'
  - 'DATASETS_DIR="$(dirname "$DATASET_DIR")"'
  - 'DATASET_DIR_NAME="$(basename "$DATASET_DIR")"'
  - 'SRC_DIR="$DATASET_DIR"'
  - 'ARCHIVE_PATH="$DATASETS_DIR/$DATASET_DIR_NAME.tgz"'
  - 'TMP_DATASETS_DIR="$TMPDIR/datasets"'
  - 'TMP_ARCHIVE="$TMPDIR/$DATASET_DIR_NAME.tgz"'
  - 'TMP_DATASET_DIR="$TMP_DATASETS_DIR/$DATASET_DIR_NAME"'
  - 'echo ">>> [DEBUG] DATASET_ID: $DATASET_ID"'
  - 'echo ">>> [DEBUG] DATASET_DIR: $DATASET_DIR"'
  - 'echo ">>> [DEBUG] DATASET_DIR_NAME: $DATASET_DIR_NAME"'
  - 'echo ">>> [DEBUG] DATASETS_DIR: $DATASETS_DIR"'
  - 'echo ">>> [DEBUG] SRC_DIR: $SRC_DIR"'
  - 'echo ">>> [DEBUG] ARCHIVE_PATH: $ARCHIVE_PATH"'
  - 'echo ">>> [DEBUG] TMP_DATASETS_DIR: $TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] TMP_ARCHIVE: $TMP_ARCHIVE"'
  - 'echo ">>> [DEBUG] TMP_DATASET_DIR: $TMP_DATASET_DIR"'
  - 'if [ ! -d "$SRC_DIR" ]; then echo "!!! [ERROR] Dataset directory not found: $SRC_DIR"; echo ">>> [DEBUG] Available directories under DATASETS_DIR:"; ls -lah "$DATASETS_DIR" 2>/dev/null || echo ">>> [DEBUG] DATASETS_DIR not listable"; exit 1; fi'
  - 'if [ ! -f "$ARCHIVE_PATH" ]; then echo "!!! [ERROR] Dataset archive not found: $ARCHIVE_PATH"; echo ">>> [DEBUG] Expected to be pre-created on submit host."; exit 1; fi'
  - 'cp "$ARCHIVE_PATH" "$TMP_ARCHIVE" || { echo "!!! [ERROR] Failed to copy archive to TMP: $TMP_ARCHIVE"; exit 1; }'
  - 'ls -lh "$TMP_ARCHIVE" || { echo "!!! [ERROR] Archive missing after copy: $TMP_ARCHIVE"; exit 1; }'
  - 'mkdir -p "$TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] Extracting $TMP_ARCHIVE into $TMP_DATASETS_DIR"'
  - 'tar -C "$TMP_DATASETS_DIR" -xzf "$TMP_ARCHIVE" || { echo "!!! [ERROR] tar extract failed for $TMP_ARCHIVE"; exit 1; }'
  - 'if [ ! -d "$TMP_DATASET_DIR" ]; then echo "!!! [ERROR] Extracted dataset directory missing: $TMP_DATASET_DIR"; exit 1; fi'
  - 'export DATASETS_DIR="$TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] DATASETS_DIR set to: $DATASETS_DIR"'
