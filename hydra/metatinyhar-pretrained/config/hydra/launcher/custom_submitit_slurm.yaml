defaults:
  - submitit_slurm

partition: normal
nodes: 1
tasks_per_node: 1
gpus_per_node: 1
cpus_per_task: 8
timeout_min: 240
mem_gb: 32

setup:
  - 'echo ">>> [DEBUG] Starting Job $SLURM_JOB_ID on Node: $(hostname)"'
  - 'echo ">>> [DEBUG] TMPDIR is located at: $TMPDIR"'
  - 'DATASET_ROOT="$(pwd)/datasets"'
  - 'DATASET_ID="${run_cfg.dataset_id}"'
  - 'SRC_DIR="$DATASET_ROOT/$DATASET_ID"'
  - 'ARCHIVE="$DATASET_ROOT/$DATASET_ID.tgz"'
  - 'TMP_DATASETS_DIR="$TMPDIR/datasets"'
  - 'TMP_ARCHIVE="$TMP_DATASETS_DIR/$DATASET_ID.tgz"'
  - 'TMP_DATASET_DIR="$TMP_DATASETS_DIR/$DATASET_ID"'
  - 'if [ ! -d "$SRC_DIR" ]; then echo "!!! [ERROR] Dataset directory not found: $SRC_DIR"; exit 1; fi'
  - 'if [ ! -f "$ARCHIVE" ]; then echo ">>> [DEBUG] Creating archive: $ARCHIVE"; tar -C "$DATASET_ROOT" -czf "$ARCHIVE" "$DATASET_ID"; else echo ">>> [DEBUG] Reusing existing archive: $ARCHIVE"; fi'
  - 'mkdir -p "$TMP_DATASETS_DIR"'
  - 'cp "$ARCHIVE" "$TMP_ARCHIVE"'
  - 'echo ">>> [DEBUG] Extracting $TMP_ARCHIVE into $TMP_DATASETS_DIR"'
  - 'tar -C "$TMP_DATASETS_DIR" -xzf "$TMP_ARCHIVE"'
  - 'if [ ! -d "$TMP_DATASET_DIR" ]; then echo "!!! [ERROR] Extracted dataset directory missing: $TMP_DATASET_DIR"; exit 1; fi'
  - 'export DATASETS_DIR="$TMP_DATASETS_DIR"'
  - 'echo ">>> [DEBUG] DATASETS_DIR set to: $DATASETS_DIR"'
  - 'RESULTS_ROOT="$(pwd)/results"'
  - 'TMP_PRETRAINED_ROOT="$TMPDIR/pretrained_results"'
  - 'mkdir -p "$TMP_PRETRAINED_ROOT"'
  - 'export PRETRAINED_RESULTS_DIR="$TMP_PRETRAINED_ROOT"'
  - 'DATASET_PREFIX="$(echo "$DATASET_ID" | tr "[:upper:]" "[:lower:]")"'
  - 'if [ -d "$RESULTS_ROOT" ]; then for exp_dir in "$RESULTS_ROOT"/"${DATASET_PREFIX}"_tinyhar*; do if [ -d "$exp_dir" ]; then echo ">>> [DEBUG] Copying pretrained experiment dir: $exp_dir"; cp -R "$exp_dir" "$TMP_PRETRAINED_ROOT/"; fi; done; fi'
  - 'RAW_CKPT="${run_cfg.tinyhar_checkpoint_path}"'
  - 'if [ "$RAW_CKPT" = "null" ] || [ -z "$RAW_CKPT" ]; then echo ">>> [DEBUG] No explicit tinyhar_checkpoint_path configured."; else CKPT_SRC="$RAW_CKPT"; if [ "${RAW_CKPT#/}" = "$RAW_CKPT" ]; then CKPT_SRC="$(pwd)/$RAW_CKPT"; fi; if [ -f "$CKPT_SRC" ]; then mkdir -p "$TMP_PRETRAINED_ROOT/checkpoints"; CKPT_DST="$TMP_PRETRAINED_ROOT/checkpoints/$(basename "$CKPT_SRC")"; cp "$CKPT_SRC" "$CKPT_DST"; export TINYHAR_CHECKPOINT_PATH_OVERRIDE="$CKPT_DST"; echo ">>> [DEBUG] Copied explicit TinyHAR checkpoint file to: $CKPT_DST"; elif [ -d "$CKPT_SRC" ]; then mkdir -p "$TMP_PRETRAINED_ROOT/checkpoints"; CKPT_DST="$TMP_PRETRAINED_ROOT/checkpoints/$(basename "$CKPT_SRC")"; cp -R "$CKPT_SRC" "$CKPT_DST"; export TINYHAR_CHECKPOINT_PATH_OVERRIDE="$CKPT_DST"; echo ">>> [DEBUG] Copied explicit TinyHAR checkpoint dir to: $CKPT_DST"; else echo "!!! [ERROR] tinyhar_checkpoint_path not found: $CKPT_SRC"; exit 1; fi; fi'
